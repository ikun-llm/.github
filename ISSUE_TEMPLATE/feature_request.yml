name: "💡 功能建议"
description: "有新想法？来，跟我一起唱跳 rap 篮球！"
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出新功能建议！每一个想法都是一次练习 ✨
  - type: dropdown
    id: category
    attributes:
      label: 建议类别
      options:
        - 新模型/新训练方式
        - 训练数据改进
        - 部署/工程化
        - 文档/教程
        - 新梗/新风格
        - 其他
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你希望添加什么功能？
      placeholder: 希望增加一个能识别篮球动作的多模态模型...
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 动机
      description: 为什么需要这个功能？
      placeholder: 因为 ikun 不能只会说梗，还要能看懂篮球...
  - type: dropdown
    id: willing
    attributes:
      label: 你愿意贡献代码实现这个功能吗？
      options:
        - 愿意！我练习了两年半就等这一刻
        - 可以帮忙但需要指导
        - 希望其他练习生来实现
